<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>API测试</title>
<style>
body{background:#111;color:#fff;font-family:sans-serif;padding:20px;font-size:14px}
button{background:#d4a843;color:#000;border:none;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:700;width:100%;margin:8px 0;cursor:pointer}
#result{background:#222;padding:12px;border-radius:8px;margin-top:10px;word-break:break-all;min-height:60px}
</style>
</head>
<body>
<h3>网络测试</h3>

<button onclick="test1()">测试1: httpbin.org</button>
<button onclick="test2()">测试2: JSONBin读取</button>
<button onclick="test3()">测试3: JSONBin写入</button>

<div id="result">点击按钮测试...</div>

<script>
var BIN_ID = '69e8745e856a6821895d3810';
var API_KEY = '$2a$10$38dIP0GZAu15ZxICquWk0.uTGCryby.wx7IpA5cDxk5LHEMNNnjP6';

function show(msg) {
  document.getElementById('result').textContent = msg;
}

function test1() {
  show('测试中...');
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'https://httpbin.org/get', true);
  xhr.timeout = 10000;
  xhr.onload = function() { show('✅ httpbin成功! 状态:' + xhr.status); };
  xhr.onerror = function() { show('❌ httpbin失败: 网络错误'); };
  xhr.ontimeout = function() { show('❌ httpbin超时'); };
  xhr.send();
}

function test2() {
  show('测试JSONBin读取...');
  var xhr = new XMLHttpRequest();
  xhr.open('GET', 'https://api.jsonbin.io/v3/b/' + BIN_ID + '/latest', true);
  xhr.setRequestHeader('X-Master-Key', API_KEY);
  xhr.timeout = 10000;
  xhr.onload = function() { show('✅ JSONBin读取成功! 状态:' + xhr.status + '\n' + xhr.responseText.substring(0,200)); };
  xhr.onerror = function() { show('❌ JSONBin读取失败: 网络错误'); };
  xhr.ontimeout = function() { show('❌ JSONBin读取超时'); };
  xhr.send();
}

function test3() {
  show('测试JSONBin写入...');
  var xhr = new XMLHttpRequest();
  xhr.open('PUT', 'https://api.jsonbin.io/v3/b/' + BIN_ID, true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.setRequestHeader('X-Master-Key', API_KEY);
  xhr.timeout = 10000;
  xhr.onload = function() { show('✅ JSONBin写入成功! 状态:' + xhr.status); };
  xhr.onerror = function() { show('❌ JSONBin写入失败: 网络错误'); };
  xhr.ontimeout = function() { show('❌ JSONBin写入超时'); };
  xhr.send(JSON.stringify({users:{}, test: Date.now()}));
}
</script>
</body>
</html>
