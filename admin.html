<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>智能轮盘 - 管理后台</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#08090d;color:#d8dae8;font-family:system-ui,'PingFang SC',sans-serif;min-height:100vh;padding:16px}
h1{color:#d4a843;font-size:18px;text-align:center;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #252836;display:flex;justify-content:space-between;align-items:center}
.login-box{max-width:340px;margin:80px auto;background:#0f1118;border:1px solid #252836;border-radius:16px;padding:28px}
.login-title{color:#d4a843;font-size:16px;font-weight:700;text-align:center;margin-bottom:20px}
input{width:100%;background:#1c1f2a;border:1px solid #252836;border-radius:8px;color:#d8dae8;font-size:14px;padding:11px;outline:none;margin-bottom:10px}
input:focus{border-color:#d4a843}
.btn{width:100%;background:#d4a843;color:#000;border:none;border-radius:10px;font-size:15px;font-weight:700;padding:13px;cursor:pointer}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-sm{background:#1c1f2a;border:1px solid #252836;color:#d8dae8;border-radius:7px;font-size:11px;padding:5px 10px;cursor:pointer;margin-right:4px;margin-top:4px}
.btn-red{color:#e05252;border-color:rgba(224,82,82,.3)}
.btn-green{color:#2eb87a;border-color:rgba(46,184,122,.3)}
.btn-blue{color:#3d7eff;border-color:rgba(61,126,255,.3)}
.btn-logout{background:transparent;border:1px solid rgba(224,82,82,.3);color:#e05252;border-radius:6px;font-size:11px;padding:5px 10px;cursor:pointer;font-weight:400}
.main{max-width:600px;margin:0 auto;display:none}
.card{background:#0f1118;border:1px solid #252836;border-radius:12px;padding:16px;margin-bottom:12px}
.card-title{color:#d4a843;font-size:12px;font-weight:700;margin-bottom:12px;letter-spacing:1px}
.stat-row{display:flex;gap:8px;margin-bottom:12px}
.stat{flex:1;background:#1c1f2a;border-radius:8px;padding:10px;text-align:center}
.stat-num{font-size:20px;font-weight:700;color:#d4a843}
.stat-label{font-size:10px;color:#5a5f7a;margin-top:2px}
.code-display{background:#1c1f2a;border:2px solid #d4a843;border-radius:10px;padding:14px;margin:12px 0}
.code-num{font-size:28px;font-weight:900;color:#d4a843;letter-spacing:4px;font-family:'Courier New',monospace;text-align:center}
.code-info{font-size:11px;color:#5a5f7a;margin-top:5px;text-align:center}
.user-item{background:#1c1f2a;border-radius:10px;padding:12px;margin-bottom:8px}
.ui-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.ui-name{font-size:14px;font-weight:700;color:#d8dae8}
.ui-info{font-size:10px;color:#5a5f7a;line-height:1.8}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700}
.bg-green{background:rgba(46,184,122,.15);color:#2eb87a}
.bg-red{background:rgba(224,82,82,.15);color:#e05252}
.bg-blue{background:rgba(61,126,255,.15);color:#3d7eff}
.msg{text-align:center;padding:8px;border-radius:8px;font-size:12px;margin-bottom:10px;display:none}
.msg-ok{background:rgba(46,184,122,.15);color:#2eb87a}
.msg-err{background:rgba(224,82,82,.15);color:#e05252}
.empty{text-align:center;color:#5a5f7a;font-size:12px;padding:20px}
.label{font-size:11px;color:#5a5f7a;margin-bottom:4px}
.days-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.row2{display:flex;gap:8px}
.row2>*{flex:1}
.loading{text-align:center;color:#5a5f7a;font-size:12px;padding:20px}
</style>
</head>
<body>

<div class="login-box" id="loginBox">
  <div class="login-title">🔒 管理员登录</div>
  <div class="label">用户名</div>
  <input type="text" id="adminUser" placeholder="admin" value="admin">
  <div class="label">密码</div>
  <input type="password" id="adminPwd" placeholder="管理员密码" onkeydown="if(event.key==='Enter')adminLogin()">
  <button class="btn" id="loginBtn" onclick="adminLogin()">登 录</button>
  <div class="msg msg-err" id="loginErr">用户名或密码错误</div>
</div>

<div class="main" id="mainBox">
  <h1><span>🎰 智能轮盘 管理后台</span> <button class="btn-logout" onclick="logout()">退出</button></h1>

  <div class="stat-row">
    <div class="stat"><div class="stat-num" id="statTotal">0</div><div class="stat-label">总用户</div></div>
    <div class="stat"><div class="stat-num" id="statActive" style="color:#2eb87a">0</div><div class="stat-label">有效</div></div>
    <div class="stat"><div class="stat-num" id="statExp" style="color:#e05252">0</div><div class="stat-label">过期</div></div>
    <div class="stat"><div class="stat-num" id="statBound" style="color:#3d7eff">0</div><div class="stat-label">已绑定</div></div>
  </div>

  <div class="card">
    <div class="card-title">➕ 创建新用户</div>
    <div class="row2">
      <div><div class="label">用户名（唯一）</div><input type="text" id="newUser" placeholder="例如:zhang01"></div>
      <div><div class="label">备注</div><input type="text" id="newNote" placeholder="例如:张三"></div>
    </div>
    <div class="label">有效天数</div>
    <div class="days-row">
      <button class="btn-sm" onclick="setDays(7)">7天</button>
      <button class="btn-sm" onclick="setDays(30)">30天</button>
      <button class="btn-sm" onclick="setDays(60)">60天</button>
      <button class="btn-sm" onclick="setDays(90)">90天</button>
      <button class="btn-sm" onclick="setDays(180)">180天</button>
      <button class="btn-sm" onclick="setDays(365)">1年</button>
    </div>
    <input type="number" id="newDays" placeholder="自定义天数">
    <button class="btn" id="createBtn" onclick="createUser()" style="margin-top:4px">🎲 创建用户并生成密码</button>
    <div id="newCodeBox" style="display:none;margin-top:12px">
      <div class="code-display">
        <div class="code-num" id="newCodeNum"></div>
        <div class="code-info" id="newCodeInfo"></div>
      </div>
      <button class="btn-sm" onclick="copyInfo()">📋 复制用户名+密码</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">👥 用户列表</div>
    <div class="msg msg-ok" id="msgOk"></div>
    <div class="msg msg-err" id="msgErr"></div>
    <input type="text" id="searchInp" placeholder="🔍 搜索用户名或备注..." oninput="filterUsers()">
    <div id="userList"><div class="loading">加载中...</div></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://tutbopofnvehjofscnom.supabase.co';
const SUPABASE_KEY = 'sb_publishable_1GZtvCsNlQFn2Xyi5cE9_Q_Sp87vKB9';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let allProfiles = [];
let _newUsername = '';
let _newCode = '';

sb.auth.getSession().then(({ data: { session } }) => {
  if (session && session.user.email === 'admin@roulette.local') {
    showMain();
  }
});

async function adminLogin() {
  const user = (document.getElementById('adminUser').value.trim().toLowerCase()) || 'admin';
  const pwd = document.getElementById('adminPwd').value;
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('loginErr');

  btn.disabled = true;
  btn.textContent = '验证中...';
  errEl.style.display = 'none';

  const { data, error } = await sb.auth.signInWithPassword({
    email: user + '@roulette.local',
    password: pwd
  });

  btn.disabled = false;
  btn.textContent = '登 录';

  if (error || user !== 'admin') {
    errEl.textContent = '用户名或密码错误';
    errEl.style.display = 'block';
    setTimeout(() => { errEl.style.display = 'none'; }, 3000);
    return;
  }

  showMain();
}

function showMain() {
  document.getElementById('loginBox').style.display = 'none';
  document.getElementById('mainBox').style.display = 'block';
  loadData();
}

async function logout() {
  if (!confirm('确定退出登录?')) return;
  await sb.auth.signOut();
  location.reload();
}

function setDays(d) { document.getElementById('newDays').value = d; }

async function loadData() {
  const { data, error } = await sb.from('user_profiles').select('*').order('created_at', { ascending: false });
  if (error) { showMsg('err', '加载失败: ' + error.message); return; }
  allProfiles = data || [];
  renderUsers(allProfiles);
}

async function createUser() {
  const username = document.getElementById('newUser').value.trim().toLowerCase();
  const note = document.getElementById('newNote').value.trim() || username;
  const days = parseInt(document.getElementById('newDays').value);
  const btn = document.getElementById('createBtn');

  if (!username) { alert('请输入用户名'); return; }
  if (!days || days < 1) { alert('请输入有效天数'); return; }

  // 生成 8 位数字密码
  let code = '';
  for (let i = 0; i < 8; i++) code += Math.floor(Math.random() * 10);

  btn.disabled = true;
  btn.textContent = '创建中...';

  // 调用 RPC 函数
  const { data, error } = await sb.rpc('admin_create_user', {
    p_username: username,
    p_password: code,
    p_note: note,
    p_days: days
  });

  btn.disabled = false;
  btn.textContent = '🎲 创建用户并生成密码';

  if (error) {
    showMsg('err', '创建失败: ' + error.message);
    return;
  }

  if (!data.success) {
    showMsg('err', '创建失败: ' + data.error);
    return;
  }

  _newUsername = username;
  _newCode = code;
  document.getElementById('newCodeNum').textContent = code;
  document.getElementById('newCodeInfo').textContent = '用户名: ' + username + '   过期: ' + new Date(data.expiry).toISOString().split('T')[0];
  document.getElementById('newCodeBox').style.display = 'block';

  document.getElementById('newUser').value = '';
  document.getElementById('newNote').value = '';
  document.getElementById('newDays').value = '';

  showMsg('ok', '✓ 用户创建成功!');
  loadData();
}

function copyInfo() {
  const text = '用户名: ' + _newUsername + '\n密码: ' + _newCode;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => alert('已复制:\n' + text)).catch(() => alert('请手动复制:\n' + text));
  } else {
    alert('请手动复制:\n' + text);
  }
}

function filterUsers() {
  const q = document.getElementById('searchInp').value.toLowerCase();
  if (!q) { renderUsers(allProfiles); return; }
  const filtered = allProfiles.filter(p =>
    p.username.toLowerCase().includes(q) || (p.note || '').toLowerCase().includes(q)
  );
  renderUsers(filtered);
}

function renderUsers(profiles) {
  const list = document.getElementById('userList');
  if (!profiles || !profiles.length) {
    list.innerHTML = '<div class="empty">暂无用户</div>';
    updateStats(0, 0, 0, 0);
    return;
  }

  let total = 0, active = 0, expired = 0, bound = 0;
  const now = Date.now();
  let html = '';

  profiles.forEach(p => {
    const expiry = new Date(p.expiry_at).getTime();
    const isExp = now > expiry || !p.is_active;
    const expDate = new Date(p.expiry_at).toISOString().split('T')[0];
    const daysLeft = Math.ceil((expiry - now) / (24 * 60 * 60 * 1000));
    const lastLogin = p.last_login ? new Date(p.last_login).toLocaleString('zh-CN') : '未登录';

    total++;
    if (isExp) expired++; else active++;
    if (p.device_id) bound++;

    html += '<div class="user-item">';
    html += '<div class="ui-top"><div>';
    html += '<div class="ui-name">' + p.username;
    if (p.note && p.note !== p.username) html += ' <span style="color:#5a5f7a;font-size:11px">(' + p.note + ')</span>';
    html += '</div>';
    html += '</div><div style="text-align:right">';
    if (isExp) html += '<span class="badge bg-red">已过期</span>';
    else html += '<span class="badge bg-green">有效 ' + daysLeft + '天</span>';
    if (p.device_id) html += '<br><span class="badge bg-blue" style="margin-top:3px">已绑定</span>';
    html += '</div></div>';
    html += '<div class="ui-info">过期: ' + expDate + '   最后登录: ' + lastLogin + '</div>';
    html += '<div style="margin-top:8px">';
    html += '<button class="btn-sm btn-green" onclick="renewUser(\'' + p.username + '\')">续期</button>';
    html += '<button class="btn-sm" onclick="resetCode(\'' + p.username + '\')">重置密码</button>';
    if (p.device_id) html += '<button class="btn-sm btn-blue" onclick="unbindUser(\'' + p.username + '\')">解绑</button>';
    html += '<button class="btn-sm btn-red" onclick="deleteUser(\'' + p.username + '\')">删除</button>';
    html += '</div></div>';
  });

  list.innerHTML = html;
  updateStats(total, active, expired, bound);
}

function updateStats(t, a, e, b) {
  document.getElementById('statTotal').textContent = t;
  document.getElementById('statActive').textContent = a;
  document.getElementById('statExp').textContent = e;
  document.getElementById('statBound').textContent = b;
}

async function renewUser(uname) {
  const days = prompt('续期天数 (输入正整数):', '30');
  if (!days) return;
  const d = parseInt(days);
  if (!d || d < 1) { alert('请输入有效天数'); return; }

  const newExpiry = new Date(Date.now() + d * 24 * 60 * 60 * 1000);
  const { error } = await sb.from('user_profiles').update({
    expiry_at: newExpiry.toISOString(),
    is_active: true
  }).eq('username', uname);

  if (error) { showMsg('err', '续期失败: ' + error.message); return; }
  showMsg('ok', '✓ 续期成功!');
  loadData();
}

async function resetCode(uname) {
  if (!confirm('重置 ' + uname + ' 的密码?')) return;

  let code = '';
  for (let i = 0; i < 8; i++) code += Math.floor(Math.random() * 10);

  const { data, error } = await sb.rpc('admin_reset_password', {
    p_username: uname,
    p_new_password: code
  });

  if (error || !data.success) {
    showMsg('err', '重置失败: ' + (error?.message || data?.error));
    return;
  }

  alert('✓ 密码已重置\n用户名: ' + uname + '\n新密码: ' + code);
}

async function unbindUser(uname) {
  if (!confirm('解绑 ' + uname + ' 的设备?')) return;
  const { error } = await sb.from('user_profiles').update({ device_id: null }).eq('username', uname);
  if (error) { showMsg('err', '解绑失败: ' + error.message); return; }
  showMsg('ok', '✓ 设备已解绑!');
  loadData();
}

async function deleteUser(uname) {
  if (!confirm('确定删除用户 ' + uname + '? (此操作不可恢复)')) return;
  const { data, error } = await sb.rpc('admin_delete_user', { p_username: uname });
  if (error || !data.success) {
    showMsg('err', '删除失败: ' + (error?.message || data?.error));
    return;
  }
  showMsg('ok', '✓ 已删除');
  loadData();
}

function showMsg(type, text) {
  const el = document.getElementById(type === 'ok' ? 'msgOk' : 'msgErr');
  el.textContent = text;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 4000);
}
</script>
</body>
</html>
