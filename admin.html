<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>智能轮盘 - 管理后台</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#08090d;color:#d8dae8;font-family:system-ui,'PingFang SC',sans-serif;min-height:100vh;padding:16px}
h1{color:#d4a843;font-size:20px;text-align:center;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid #252836}
.login-box{max-width:360px;margin:80px auto;background:#0f1118;border:1px solid #252836;border-radius:16px;padding:28px}
.login-title{color:#d4a843;font-size:16px;font-weight:700;text-align:center;margin-bottom:20px}
input{width:100%;background:#1c1f2a;border:1px solid #252836;border-radius:8px;color:#d8dae8;font-size:15px;padding:12px;outline:none;margin-bottom:12px}
input:focus{border-color:#d4a843}
.btn{width:100%;background:#d4a843;color:#000;border:none;border-radius:10px;font-size:15px;font-weight:700;padding:13px;cursor:pointer}
.btn:active{opacity:.85}
.btn-red{background:#e05252;color:#fff}
.btn-sm{background:#1c1f2a;border:1px solid #252836;color:#d8dae8;border-radius:8px;font-size:12px;padding:7px 14px;cursor:pointer;margin-right:6px}
.btn-sm:active{opacity:.8}
.main{max-width:600px;margin:0 auto;display:none}
.card{background:#0f1118;border:1px solid #252836;border-radius:12px;padding:18px;margin-bottom:14px}
.card-title{color:#d4a843;font-size:13px;font-weight:700;margin-bottom:14px;letter-spacing:1px}
.row{display:flex;gap:10px;margin-bottom:12px}
.row input{margin-bottom:0}
.label{font-size:11px;color:#5a5f7a;margin-bottom:5px}
.code-display{background:#1c1f2a;border:2px solid #d4a843;border-radius:10px;padding:16px;text-align:center;margin-bottom:12px}
.code-num{font-size:36px;font-weight:900;color:#d4a843;letter-spacing:6px;font-family:'Courier New',monospace}
.code-info{font-size:11px;color:#5a5f7a;margin-top:6px}
.user-list{margin-top:4px}
.user-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#1c1f2a;border-radius:8px;margin-bottom:6px;font-size:12px}
.ui-code{font-family:'Courier New',monospace;font-size:14px;font-weight:700;color:#d4a843;letter-spacing:2px}
.ui-exp{color:#5a5f7a}
.ui-exp.ok{color:#2eb87a}
.ui-exp.exp{color:#e05252}
.badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700}
.bg-green{background:rgba(46,184,122,.15);color:#2eb87a}
.bg-red{background:rgba(224,82,82,.15);color:#e05252}
.bg-yellow{background:rgba(212,168,67,.15);color:#d4a843}
.msg{text-align:center;padding:8px;border-radius:8px;font-size:12px;margin-bottom:10px;display:none}
.msg-ok{background:rgba(46,184,122,.15);color:#2eb87a}
.msg-err{background:rgba(224,82,82,.15);color:#e05252}
.stat-row{display:flex;gap:10px;margin-bottom:14px}
.stat{flex:1;background:#1c1f2a;border-radius:8px;padding:12px;text-align:center}
.stat-num{font-size:22px;font-weight:700;color:#d4a843}
.stat-label{font-size:10px;color:#5a5f7a;margin-top:3px}
.empty{text-align:center;color:#5a5f7a;font-size:12px;padding:20px}
</style>
</head>
<body>

<!-- 登录界面 -->
<div class="login-box" id="loginBox">
  <div class="login-title">🔐 管理员登录</div>
  <div class="label">管理员密码</div>
  <input type="password" id="adminPwd" placeholder="输入管理员密码" onkeydown="if(event.key==='Enter')adminLogin()">
  <button class="btn" onclick="adminLogin()">登录</button>
  <div class="msg msg-err" id="loginErr">密码错误</div>
</div>

<!-- 主界面 -->
<div class="main" id="mainBox">
  <h1>🎰 智能轮盘 管理后台</h1>

  <!-- 统计 -->
  <div class="stat-row">
    <div class="stat"><div class="stat-num" id="statTotal">0</div><div class="stat-label">总用户</div></div>
    <div class="stat"><div class="stat-num" id="statActive" style="color:#2eb87a">0</div><div class="stat-label">有效</div></div>
    <div class="stat"><div class="stat-num" id="statExp" style="color:#e05252">0</div><div class="stat-label">已过期</div></div>
  </div>

  <!-- 生成密码 -->
  <div class="card">
    <div class="card-title">➕ 生成新密码</div>
    <div class="label">备注（用户名/备注）</div>
    <input type="text" id="newNote" placeholder="例如：用户001、张三">
    <div class="label">有效天数</div>
    <div class="row">
      <button class="btn-sm" onclick="setDays(30)">30天</button>
      <button class="btn-sm" onclick="setDays(60)">60天</button>
      <button class="btn-sm" onclick="setDays(90)">90天</button>
      <button class="btn-sm" onclick="setDays(180)">180天</button>
      <button class="btn-sm" onclick="setDays(365)">1年</button>
    </div>
    <br>
    <input type="number" id="newDays" placeholder="自定义天数" style="margin-bottom:12px">
    <button class="btn" onclick="generateCode()">🎲 生成密码</button>
    <div id="newCodeBox" style="display:none;margin-top:14px">
      <div class="code-display">
        <div class="code-num" id="newCodeNum"></div>
        <div class="code-info" id="newCodeInfo"></div>
      </div>
      <button class="btn-sm" onclick="copyCode()">📋 复制密码</button>
    </div>
  </div>

  <!-- 用户列表 -->
  <div class="card">
    <div class="card-title">👥 用户列表</div>
    <div class="msg msg-ok" id="msgOk"></div>
    <div class="msg msg-err" id="msgErr"></div>
    <div class="user-list" id="userList"><div class="empty">暂无用户</div></div>
  </div>
</div>

<script>
// ===== Firebase 配置 =====
const DB_URL = 'https://rouletteapp-f38fa-default-rtdb.asia-southeast1.firebasedatabase.app';
const ADMIN_PASSWORD = '888888'; // 管理员密码，可以改

function adminLogin() {
  var pwd = document.getElementById('adminPwd').value;
  if (pwd === ADMIN_PASSWORD) {
    document.getElementById('loginBox').style.display = 'none';
    document.getElementById('mainBox').style.display = 'block';
    loadUsers();
  } else {
    var err = document.getElementById('loginErr');
    err.style.display = 'block';
    setTimeout(function(){ err.style.display = 'none'; }, 2000);
  }
}

function setDays(d) {
  document.getElementById('newDays').value = d;
}

function generateCode() {
  var days = parseInt(document.getElementById('newDays').value);
  var note = document.getElementById('newNote').value || '用户';
  if (!days || days < 1) { alert('请输入有效天数'); return; }

  // 生成8位随机数字
  var code = '';
  for (var i = 0; i < 8; i++) code += Math.floor(Math.random() * 10);

  var now = Date.now();
  var expiry = now + days * 24 * 60 * 60 * 1000;
  var expiryStr = new Date(expiry).toISOString().split('T')[0];

  var data = { code: code, note: note, created: now, expiry: expiry, active: true };

  fetch(DB_URL + '/codes/' + code + '.json', {
    method: 'PUT',
    body: JSON.stringify(data)
  }).then(function(r) { return r.json(); }).then(function() {
    document.getElementById('newCodeNum').textContent = code;
    document.getElementById('newCodeInfo').textContent = note + ' · 有效期至 ' + expiryStr + ' (' + days + '天)';
    document.getElementById('newCodeBox').style.display = 'block';
    loadUsers();
  }).catch(function(e) { alert('生成失败：' + e.message); });
}

function copyCode() {
  var code = document.getElementById('newCodeNum').textContent;
  navigator.clipboard.writeText(code).then(function() {
    alert('密码已复制：' + code);
  }).catch(function() {
    prompt('请手动复制密码：', code);
  });
}

function loadUsers() {
  fetch(DB_URL + '/codes.json').then(function(r) { return r.json(); }).then(function(data) {
    var list = document.getElementById('userList');
    if (!data) { list.innerHTML = '<div class="empty">暂无用户</div>'; updateStats(0,0,0); return; }

    var total = 0, active = 0, expired = 0;
    var now = Date.now();
    var html = '';

    Object.entries(data).sort(function(a,b){ return b[1].created - a[1].created; }).forEach(function(entry) {
      var code = entry[0];
      var d = entry[1];
      var isExp = now > d.expiry || !d.active;
      var expDate = new Date(d.expiry).toISOString().split('T')[0];
      var daysLeft = Math.ceil((d.expiry - now) / (24*60*60*1000));

      total++;
      if (isExp) expired++; else active++;

      html += '<div class="user-item">';
      html += '<div>';
      html += '<div class="ui-code">' + code + '</div>';
      html += '<div style="color:#5a5f7a;font-size:11px;margin-top:2px">' + (d.note||'') + '</div>';
      html += '</div>';
      html += '<div style="text-align:right">';
      if (isExp) {
        html += '<span class="badge bg-red">已过期</span>';
      } else {
        html += '<span class="badge bg-green">有效 ' + daysLeft + '天</span>';
      }
      html += '<div style="color:#5a5f7a;font-size:10px;margin-top:3px">到期:' + expDate + '</div>';
      html += '<div style="margin-top:5px">';
      html += '<button class="btn-sm" onclick="renewCode(\'' + code + '\')">续费</button>';
      html += '<button class="btn-sm" style="color:#e05252" onclick="deleteCode(\'' + code + '\')">删除</button>';
      html += '</div>';
      html += '</div>';
      html += '</div>';
    });

    list.innerHTML = html;
    updateStats(total, active, expired);
  });
}

function updateStats(t, a, e) {
  document.getElementById('statTotal').textContent = t;
  document.getElementById('statActive').textContent = a;
  document.getElementById('statExp').textContent = e;
}

function renewCode(code) {
  var days = prompt('续费天数（从今天起）：', '30');
  if (!days) return;
  days = parseInt(days);
  var newExpiry = Date.now() + days * 24 * 60 * 60 * 1000;
  fetch(DB_URL + '/codes/' + code + '/expiry.json', {
    method: 'PUT', body: JSON.stringify(newExpiry)
  }).then(function() {
    fetch(DB_URL + '/codes/' + code + '/active.json', {
      method: 'PUT', body: JSON.stringify(true)
    }).then(function() {
      showMsg('ok', '续费成功！有效期延长' + days + '天');
      loadUsers();
    });
  });
}

function deleteCode(code) {
  if (!confirm('确定删除密码 ' + code + ' ？')) return;
  fetch(DB_URL + '/codes/' + code + '.json', { method: 'DELETE' }).then(function() {
    showMsg('ok', '已删除');
    loadUsers();
  });
}

function showMsg(type, text) {
  var el = document.getElementById(type === 'ok' ? 'msgOk' : 'msgErr');
  el.textContent = text;
  el.style.display = 'block';
  setTimeout(function(){ el.style.display = 'none'; }, 3000);
}
</script>
</body>
</html>
