<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>智能轮盘 - 下载</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0b10;color:#d8dae8;font-family:system-ui,'PingFang SC','Microsoft YaHei',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.container{max-width:480px;width:100%;text-align:center}
.logo{width:120px;height:120px;border-radius:28px;margin:0 auto 24px;display:block;box-shadow:0 8px 32px rgba(212,168,67,.3)}
h1{font-size:28px;font-weight:800;color:#d4a843;margin-bottom:8px;letter-spacing:1px}
.subtitle{font-size:14px;color:#5a5f7a;margin-bottom:40px}
.card{background:#0f1118;border:1px solid #252836;border-radius:16px;padding:28px;margin-bottom:16px}
.version{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.ver-label{font-size:12px;color:#5a5f7a}
.ver-num{font-size:13px;color:#d4a843;font-weight:700;background:rgba(212,168,67,.1);padding:3px 10px;border-radius:8px}
.features{text-align:left;margin-bottom:24px}
.feature{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1c1f2a;font-size:13px}
.feature:last-child{border-bottom:none}
.feature-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.fi-gold{background:rgba(212,168,67,.15)}
.fi-red{background:rgba(224,82,82,.15)}
.fi-blue{background:rgba(61,126,255,.15)}
.fi-green{background:rgba(46,184,122,.15)}
.btn-download{display:block;background:linear-gradient(135deg,#d4a843,#f0c060);color:#000;font-size:17px;font-weight:800;padding:16px;border-radius:14px;text-decoration:none;letter-spacing:1px;box-shadow:0 4px 20px rgba(212,168,67,.4);transition:all .2s}
.btn-download:active{transform:scale(.97);opacity:.9}
.btn-icon{margin-right:8px;font-size:20px}
.notice{background:rgba(61,126,255,.08);border:1px solid rgba(61,126,255,.2);border-radius:10px;padding:14px;margin-top:16px;font-size:12px;color:#6699ff;line-height:1.8;text-align:left}
.notice strong{color:#3d7eff}
.footer{margin-top:32px;font-size:11px;color:#2a2d3a}
.steps{text-align:left;margin-top:20px}
.step{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid #1c1f2a;font-size:12px;color:#5a5f7a}
.step:last-child{border-bottom:none}
.step-num{width:22px;height:22px;border-radius:50%;background:#1c1f2a;color:#d4a843;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
</style>
</head>
<body>
<div class="container">

    </div>
    <div class="features">
      <div class="feature">
        <div class="feature-icon fi-gold">📊</div>
        <span>实时数据分析与统计</span>
      </div>
      <div class="feature">
        <div class="feature-icon fi-red">🎯</div>

      </div>
      <div class="feature">

      </div>
      <div class="feature">
        <div class="feature-icon fi-green">🔒</div>

      </div>
    </div>
    <a href="app.apk" class="btn-download">
      <span class="btn-icon">⬇️</span>立即下载 APK
    </a>
  </div>

  <div class="notice">
    <strong>安装说明：</strong><br>
    1. 下载完成后点击 APK 文件<br>
    2. 如提示"未知来源"，请在设置中允许安装<br>
    3. 安装后输入授权密码即可使用<br>
    4. 如需获取密码请联系管理员

  <div class="card" style="margin-top:16px">
    <div style="font-size:12px;color:#5a5f7a;margin-bottom:12px;text-align:left">安装步骤</div>
    <div class="steps">
      <div class="step"><div class="step-num">1</div><span>点击上方按钮下载 APK 文件</span></div>

      <div class="step"><div class="step-num">3</div><span>点击安装，允许未知来源</span></div>
      <div class="step"><div class="step-num">4</div><span>输入授权密码开始使用</span></div>
    </div>
  </div>

  <div class="footer">© 2026 智能轮盘 · 未经授权禁止使用</div>
</div>
</body>
</html>
