.btn{

  border-radius:12px;

  font-weight:800;
  padding:16px;
  cursor:pointer;
  text-align:center;
  text-decoration:none;
  margin-bottom:12px;
  box-shadow: 0 6px 20px rgba(212,168,67,0.3);

}
.btn:active{
  transform:scale(0.98);

}
.btn-secondary{

  padding:13px;

  text-align:center;
  text-decoration:none;

}
.btn-secondary:active{opacity:0.7}
.divider{
  text-align:center;
  color:#5a5f7a;
  font-size:11px;
  margin:18px 0;
  position:relative;
}
.divider::before,.divider::after{
  content:'';
  position:absolute;
  top:50%;
  width:30%;
  height:1px;
  background:#252836;
}
.divider::before{left:0}
.divider::after{right:0}
.tips{
