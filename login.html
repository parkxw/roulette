<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .login-box {
      background: white; padding: 40px 30px;
      border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      width: 100%; max-width: 380px;
    }
    h1 { text-align: center; color: #333; margin-bottom: 8px; font-size: 24px; }
    .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 28px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; margin-bottom: 8px; color: #555; font-size: 14px; }
    input {
      width: 100%; padding: 12px 14px;
      border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px;
    }
    input:focus { outline: none; border-color: #667eea; }
    button {
      width: 100%; padding: 14px; background: #667eea;
      color: white; border: none; border-radius: 8px;
      font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px;
    }
    button:disabled { background: #aaa; }
    .message {
      margin-top: 16px; padding: 12px; border-radius: 8px;
      font-size: 14px; text-align: center; display: none; word-break: break-word;
    }
    .message.error { background: #fee; color: #c33; display: block; }
    .message.success { background: #efe; color: #3a3; display: block; }
    .status {
      margin-top: 10px; padding: 8px; font-size: 11px;
      background: #f5f5f5; border-radius: 4px; color: #666;
      font-family: monospace; word-break: break-all;
    }
  </style>
</head>
